[phases.setup]
nixPkgs = ["nodejs_22", "postgresql"]

[phases.build]
cmds = [
    "cd client && npm ci && npm run build",
    "cd comrade && python manage.py collectstatic --noinput",
]

[start]
cmd = "cd comrade && python manage.py migrate --noinput && daphne -b 0.0.0.0 -p $PORT comrade.asgi:application"
