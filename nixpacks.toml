[phases.setup]
nixPkgs = ["python312", "nodejs_22", "postgresql"]

[phases.install]
cmds = [
    "python3 -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install pipenv && PIPENV_VENV_IN_PROJECT=1 pipenv install --deploy",
    "cd client && rm -f package-lock.json && npm install",
]

[phases.build]
cmds = [
    "cd client && npm run build",
    "cd comrade && python manage.py collectstatic --noinput",
]

[start]
cmd = "cd comrade && python manage.py migrate --noinput && daphne -b 0.0.0.0 -p $PORT comrade.asgi:application"
